<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solvara: Echoes of the Wilds</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background-image: url(assets/images/backgrounds/background.png);
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    /* Container zentriert das Spiel */
    #gameContainer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glow hinter dem Spiel für Tiefe */
    #gameContainer::before {
      content: "";
      position: absolute;
      width: 820px;
      height: 580px;
      background: radial-gradient(circle,
          rgba(255, 210, 140, 0.25),
          rgba(0, 0, 0, 0) 70%);
      filter: blur(35px);
      z-index: 0;
    }

    /* Der eigentliche Spielrahmen */
    canvas {
      position: relative;
      z-index: 1;

      width: 720px;
      height: 480px;

      image-rendering: pixelated;
      image-rendering: crisp-edges;

      border-radius: 12px;

      /* Holzrahmen */
      border: 14px solid #3b2515;

      /* Mehrschichtiger Rahmen + Tiefe */
      box-shadow:
        inset 0 0 0 3px #b58a45,
        /* goldene Zierkante */
        inset 0 0 0 6px #6b4425,
        /* Holzstruktur */
        inset 0 0 0 10px #2a1a0f,
        /* dunkle Innenkante */
        0 20px 60px rgba(0, 0, 0, 0.75);
      /* Drop Shadow */
    }

    /* Fullscreen */
    :fullscreen canvas,
    :-webkit-full-screen canvas {
      width: 100vw;
      height: 100vh;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
  </style>
</head>

<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="720" height="480"></canvas>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
