<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Solvara: Echoes of the Wilds</title>
  <link rel="icon" type="image/png" href="./assets/images/favicon.png">
  <link rel="stylesheet" href="./styles/shell.css">
  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>
  <div id="pageChrome" aria-label="Seitenelemente">
    <div class="shell-toolbar shell-toolbar--desktop">
      <button id="muteToggle" class="shell-btn" type="button" aria-pressed="false" data-mute-toggle>
        <span class="shell-btn__icon" data-mute-icon>🔊</span>
        <span class="shell-btn__text" data-mute-label>Ton aus</span>
      </button>
      <a class="shell-link" href="./pages/impressum.html">Impressum</a>
      <a class="shell-link" href="./pages/datenschutz.html">Datenschutz</a>
    </div>

    <div class="shell-mobile">
      <button
        id="shellMenuToggle"
        class="shell-menu-trigger"
        type="button"
        aria-expanded="false"
        aria-controls="shellMobileMenu"
        aria-label="Seitenmenü öffnen">
        <span class="shell-menu-trigger__icon">✦</span>
        <span class="shell-menu-trigger__label">Menü</span>
      </button>

      <div id="shellMobileMenu" class="shell-dropdown" hidden>
        <button class="shell-dropdown__item" type="button" data-mute-toggle>
          <span class="shell-btn__icon" data-mute-icon>🔊</span>
          <span data-mute-label>Ton aus</span>
        </button>
        <a class="shell-dropdown__item" href="./pages/impressum.html" data-shell-close>Impressum</a>
        <a class="shell-dropdown__item" href="./pages/datenschutz.html" data-shell-close>Datenschutz</a>
      </div>
    </div>
  </div>

  <div id="gameContainer">
    <canvas id="gameCanvas" width="720" height="480"></canvas>
  </div>

  <div id="rotateOverlay" role="alert" aria-live="polite">
    <div class="rotate-icon">↻</div>
    <div class="rotate-main">Rotate device to play</div>
    <div class="rotate-sub">Gerät drehen zum Spielen</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
