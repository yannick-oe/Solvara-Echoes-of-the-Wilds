<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Solvara: Echoes of the Wilds</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background-image: url(assets/images/backgrounds/background.png);
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    /* Container zentriert das Spiel */
    #gameContainer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glow hinter dem Spiel für Tiefe */
    #gameContainer::before {
      content: "";
      position: absolute;
      width: 820px;
      height: 580px;
      background: radial-gradient(circle,
          rgba(255, 210, 140, 0.25),
          rgba(0, 0, 0, 0) 70%);
      filter: blur(35px);
      z-index: 0;
    }

    /* Der eigentliche Spielrahmen */
    canvas {
      position: relative;
      z-index: 1;

      width: 720px;
      height: 480px;

      image-rendering: pixelated;
      image-rendering: crisp-edges;

      border-radius: 12px;

      /* Holzrahmen */
      border: 14px solid #3b2515;

      /* Mehrschichtiger Rahmen + Tiefe */
      box-shadow:
        inset 0 0 0 3px #b58a45,
        /* goldene Zierkante */
        inset 0 0 0 6px #6b4425,
        /* Holzstruktur */
        inset 0 0 0 10px #2a1a0f,
        /* dunkle Innenkante */
        0 20px 60px rgba(0, 0, 0, 0.75);
      /* Drop Shadow */

      /* Touch-Scroll auf Canvas verhindern */
      touch-action: none;
    }

    /* Fullscreen */
    :fullscreen canvas,
    :-webkit-full-screen canvas {
      width: 100vw;
      height: 100vh;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    /* ── Mobile: Kein Hintergrundglow ────────────────────────────── */
    @media (pointer: coarse) {
      #gameContainer::before {
        display: none;
      }
    }

    /* ── Mobile Landscape: Canvas füllt gesamten Viewport ──────────── */
    @media (pointer: coarse) and (orientation: landscape) {
      #gameContainer {
        /* Am sichtbaren Viewport verankern – verhindert Versatz durch Browser-Chrome */
        position: fixed;
      }

      canvas {
        /* Maximale Größe bei 3:2 Seitenverhältnis ohne Verzerrung */
        width: min(100vw, 150vh);    /* Fallback für ältere Browser */
        width: min(100vw, 150dvh);   /* dvh = dynamic VH, kein Browser-Chrome */
        height: auto;
        aspect-ratio: 3 / 2;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* ── Touch-Button: gedrückter Zustand ─────────────────────────── */
    .tc-btn.tc-active {
      background: rgba(155, 115, 26, 0.78) !important;
      border-color: rgba(240, 200, 78, 0.95) !important;
      color: rgba(255, 248, 168, 1.0) !important;
    }

    /* ── Hochformat-Sperrbildschirm ────────────────────────────────── */
    #rotateOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(8, 6, 3, 0.94);
      color: #f0c040;
      font-family: serif;
      text-align: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 32px;
      box-sizing: border-box;
    }

    #rotateOverlay .rotate-icon {
      font-size: 72px;
      line-height: 1;
      animation: rotatePulse 2s ease-in-out infinite;
    }

    @keyframes rotatePulse {
      0%, 100% { opacity: 1.0;   transform: rotate(0deg);   }
      50%       { opacity: 0.65; transform: rotate(90deg); }
    }

    #rotateOverlay .rotate-main {
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    #rotateOverlay .rotate-sub {
      font-size: 15px;
      color: #c8b090;
    }

    @media (pointer: coarse) and (orientation: portrait) {
      #rotateOverlay {
        display: flex;
      }
    }
  </style>
</head>

<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="720" height="480"></canvas>
  </div>

  <!-- Hochformat-Sperrbildschirm (wird per CSS bei portrait + coarse-pointer eingeblendet) -->
  <div id="rotateOverlay" role="alert" aria-live="polite">
    <div class="rotate-icon">↻</div>
    <div class="rotate-main">Rotate device to play</div>
    <div class="rotate-sub">Gerät drehen zum Spielen</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
