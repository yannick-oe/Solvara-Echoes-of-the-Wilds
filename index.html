<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solvara: Echoes of the Wilds</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-image: url(assets/images/backgrounds/background.png);
      background-size: cover;
      background-position: center;
    }

    #gameContainer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 720px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Vollbild: Canvas und Container füllen den gesamten Bildschirm */
    :fullscreen #gameContainer,
    :-webkit-full-screen #gameContainer {
      background: #000;
    }

    :fullscreen canvas,
    :-webkit-full-screen canvas {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="720" height="480"></canvas>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
